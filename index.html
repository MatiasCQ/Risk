// ─── P2P MANAGER (PeerJS — WebRTC real entre dispositivos) ─────────────
/*
  Arquitectura:
  • Host: crea sala con un código único (su Peer ID). Gestiona TODA la lógica del juego.
          Recibe acciones de los clientes, las aplica y retransmite el nuevo estado.
  • Client: se conecta al Host usando el código de sala. Envía acciones y recibe estado.
 
  Mensajes Host → Clientes:
    lobby_update  { players }
    game_start    { players, playerIdMap, initialGs }
    game_state    { gs }
    kicked        { msg }
 
  Mensajes Cliente → Host:
    join          { name, peerId }
    game_action   { action, peerId }
*/
class P2PManager {
  constructor() {
    this.peer        = null;
    this.connections = {};      // peerId → DataConnection  (solo host)
    this.hostConn    = null;    // DataConnection al host    (solo cliente)
    this.isHost      = false;
    this.roomCode    = null;
    this.myPeerId    = null;
    this.myPlayerId  = null;    // "p0", "p1", …
    this.lobbyPlayers = [];     // [{ peerId, name, isHost }]
 
    // Callbacks asignados externamente por los componentes
    this.onLobbyUpdate     = null;  // (players[]) => void
    this.onGameStart       = null;  // (players, myPlayerId, initialGs) => void
    this.onGameStateUpdate = null;  // (gs) => void
    this.onGameAction      = null;  // (action, senderPeerId) => void  [host only]
    this.onDisconnect      = null;  // (msg) => void
  }
 
  // ── Crear sala (host) ─────────────────────────────────────────────
  // Devuelve Promise<roomCode>
  createRoom(playerName) {
    return new Promise((resolve, reject) => {
      this.isHost      = true;
      this.playerName  = playerName;
 
      const code = Math.random().toString(36).substr(2, 6).toUpperCase();
 
      try { this.peer = new Peer(code); }
      catch (e) { reject(new Error('PeerJS no disponible. ¿Está cargado el script?')); return; }
 
      const timer = setTimeout(() => reject(new Error('Tiempo de espera agotado (15s)')), 15000);
 
      this.peer.on('open', id => {
        clearTimeout(timer);
        this.roomCode    = id;
        this.myPeerId    = id;
        this.lobbyPlayers = [{ peerId: id, name: playerName, isHost: true }];
        resolve(id);
      });
 
      this.peer.on('connection', conn => this._onNewConnection(conn));
 
      this.peer.on('error', err => {
        clearTimeout(timer);
        // Si el ID ya está en uso, reintentar con uno nuevo
        if (err.type === 'unavailable-id') {
          this.peer.destroy();
          this.peer = null;
          const code2 = Math.random().toString(36).substr(2, 6).toUpperCase();
          this.peer = new Peer(code2);
          this.peer.on('open', id => { clearTimeout(timer); this.roomCode = id; this.myPeerId = id; this.lobbyPlayers = [{ peerId: id, name: playerName, isHost: true }]; resolve(id); });
          this.peer.on('connection', c => this._onNewConnection(c));
          this.peer.on('error', e2 => { clearTimeout(timer); reject(e2); });
        } else {
          reject(err);
        }
      });
    });
  }
 
  // ── Unirse a sala (cliente) ────────────────────────────────────────
  // Devuelve Promise<void> (resuelve cuando la conexión con el host se abre)
  joinRoom(roomCode, playerName) {
    return new Promise((resolve, reject) => {
      this.isHost     = false;
      this.roomCode   = roomCode;
      this.playerName = playerName;
 
      const timer = setTimeout(() => reject(new Error('Tiempo de espera agotado (15s). Verifica el código.')), 15000);
 
      try { this.peer = new Peer(); }
      catch (e) { clearTimeout(timer); reject(new Error('PeerJS no disponible.')); return; }
 
      this.peer.on('open', id => {
        this.myPeerId = id;
        const conn = this.peer.connect(roomCode, { reliable: true });
        this.hostConn = conn;
 
        conn.on('open', () => {
          clearTimeout(timer);
          conn.send({ type: 'join', name: playerName, peerId: id });
          resolve();
        });
 
        conn.on('data',  data => this._onHostMessage(data));
        conn.on('close', ()   => { if (this.onDisconnect) this.onDisconnect('El host se desconectó'); });
        conn.on('error', err  => { clearTimeout(timer); reject(err); });
      });
 
      this.peer.on('error', err => { clearTimeout(timer); reject(err); });
    });
  }
 
  // ── Manejo de conexiones nuevas (host) ────────────────────────────
  _onNewConnection(conn) {
    conn.on('open', () => {
      conn.on('data',  data => this._onClientMessage(conn, data));
      conn.on('close', ()   => this._removePlayer(conn.peer));
      conn.on('error', err  => console.warn('P2P conn error:', err));
    });
  }
 
  // ── Mensajes que llegan al host desde un cliente ───────────────────
  _onClientMessage(conn, data) {
    if (data.type === 'join') {
      if (this.lobbyPlayers.length >= 6) {
        conn.send({ type: 'kicked', msg: 'La sala está llena (máx. 6 jugadores)' });
        return;
      }
      this.lobbyPlayers.push({ peerId: data.peerId, name: data.name, isHost: false });
      this.connections[data.peerId] = conn;
      this._broadcastLobby();
    } else if (data.type === 'game_action') {
      if (this.onGameAction) this.onGameAction(data.action, data.peerId);
    }
  }
 
  // ── Mensajes que llegan al cliente desde el host ───────────────────
  _onHostMessage(data) {
    switch (data.type) {
      case 'lobby_update':
        this.lobbyPlayers = data.players;
        if (this.onLobbyUpdate) this.onLobbyUpdate([...data.players]);
        break;
      case 'game_start':
        this.myPlayerId = data.playerIdMap[this.myPeerId];
        if (this.onGameStart) this.onGameStart(data.players, this.myPlayerId, data.initialGs);
        break;
      case 'game_state':
        if (this.onGameStateUpdate) this.onGameStateUpdate(data.gs);
        break;
      case 'kicked':
        if (this.onDisconnect) this.onDisconnect(data.msg || 'Fuiste expulsado de la sala');
        this.destroy();
        break;
    }
  }
 
  // ── Utilidades del host ───────────────────────────────────────────
  _broadcastLobby() {
    const msg = { type: 'lobby_update', players: this.lobbyPlayers };
    Object.values(this.connections).forEach(c => { try { c.send(msg); } catch (e) {} });
    if (this.onLobbyUpdate) this.onLobbyUpdate([...this.lobbyPlayers]);
  }
 
  _removePlayer(peerId) {
    this.lobbyPlayers = this.lobbyPlayers.filter(p => p.peerId !== peerId);
    delete this.connections[peerId];
    this._broadcastLobby();
  }
 
  kickPlayer(peerId) {
    const conn = this.connections[peerId];
    if (conn) {
      try { conn.send({ type: 'kicked', msg: 'Expulsado por el host' }); } catch (e) {}
      setTimeout(() => { try { conn.close(); } catch (e) {} }, 300);
    }
    this._removePlayer(peerId);
  }
 
  // Inicia el juego: crea el estado inicial y lo envía a todos
  // Devuelve { players, myPlayerId, initialGs }
  startGame() {
    const players = this.lobbyPlayers.map((p, i) => ({
      id:     'p' + i,
      name:   p.name,
      color:  PLAYER_COLORS[i],
      peerId: p.peerId,
    }));
 
    const playerIdMap = {};
    players.forEach(p => { playerIdMap[p.peerId] = p.id; });
 
    this.myPlayerId = playerIdMap[this.myPeerId];
 
    // El host genera el estado inicial (random) y lo comparte para que todos tengan el mismo
    const initialGs = initGame(players.map(p => ({ id: p.id, name: p.name, color: p.color, peerId: p.peerId })));
 
    const msg = { type: 'game_start', players, playerIdMap, initialGs };
    Object.values(this.connections).forEach(c => { try { c.send(msg); } catch (e) {} });
 
    return { players, myPlayerId: this.myPlayerId, initialGs };
  }
 
  // Retransmite el estado del juego a todos los clientes
  broadcastGameState(gs) {
    const msg = { type: 'game_state', gs };
    Object.values(this.connections).forEach(c => { try { c.send(msg); } catch (e) {} });
  }
 
  // Cliente envía una acción al host
  sendAction(action) {
    if (this.hostConn && this.hostConn.open) {
      this.hostConn.send({ type: 'game_action', action, peerId: this.myPeerId });
    }
  }
 
  destroy() {
    try {
      Object.values(this.connections).forEach(c => c.close());
      if (this.hostConn) this.hostConn.close();
      if (this.peer)     this.peer.destroy();
    } catch (e) {}
    this.peer         = null;
    this.connections  = {};
    this.hostConn     = null;
    this.onLobbyUpdate     = null;
    this.onGameStart       = null;
    this.onGameStateUpdate = null;
    this.onGameAction      = null;
    this.onDisconnect      = null;
  }
}
 
// ─── UTILS ──────────────────────────────────────────────────────────
function rollDie() { return Math.floor(Math.random() * 6) + 1; }
function rollDice(n) { return Array.from({length: n}, rollDie).sort((a,b) => b-a); }
function resolveAttack(atkDice, defDice) {
  let aLoss = 0, dLoss = 0;
  const pairs = Math.min(atkDice.length, defDice.length);
  for (let i = 0; i < pairs; i++) {
    if (atkDice[i] > defDice[i]) dLoss++; else aLoss++;
  }
  return { aLoss, dLoss };
}
function hashStr(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = Math.imul(31, h) + s.charCodeAt(i) | 0;
  return Math.abs(h);
}
function pointsPath(pts) {
  if (!pts.length) return "";
  return `M ${pts.map(([x,y]) => `${x.toFixed(1)} ${y.toFixed(1)}`).join(" L ")} Z`;
}
function makeTerritoryPolygon(tid) {
  const pos  = TERRITORY_POSITIONS[tid]; if (!pos) return [];
  const cont = TERRITORY_CONTINENT[tid];
  const seed = hashStr(tid);
  const base = { north_america:{rx:22,ry:14}, south_america:{rx:18,ry:20}, europe:{rx:16,ry:11}, africa:{rx:18,ry:18}, asia:{rx:18,ry:13}, australia:{rx:17,ry:11} }[cont] || {rx:18,ry:14};
  const rot    = ((seed % 360) - 180) * Math.PI / 180;
  const wobble = [0.92,1.08,0.96,1.12,0.98,1.04,0.90,1.06];
  return Array.from({length:8}, (_, i) => {
    const angle = rot + (Math.PI * 2 * i) / 8;
    const rx = base.rx * wobble[(seed + i)     % 8];
    const ry = base.ry * wobble[(seed + i * 3) % 8];
    return [pos.x + Math.cos(angle)*rx + Math.sin(angle*1.3)*2.4,
            pos.y + Math.sin(angle)*ry + Math.cos(angle*1.1)*1.8];
  });
}
function groupByContinent() {
  const g = {};
  for (const [tid, cont] of Object.entries(TERRITORY_CONTINENT)) {
    if (!g[cont]) g[cont] = [];
    g[cont].push(tid);
  }
  return g;
}
function calcReinforcements(territories, playerId) {
  const owned = territories.filter(t => t.owner === playerId);
  let bonus = Math.max(3, Math.floor(owned.length / 3));
  const ownedIds = new Set(owned.map(t => t.id));
  for (const [cont, tids] of Object.entries(groupByContinent())) {
    if (tids.every(id => ownedIds.has(id))) bonus += CONTINENT_BONUS[cont] || 0;
  }
  return bonus;
}
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function initGame(players) {
  const tids     = Object.keys(TERRITORY_POSITIONS);
  const shuffled = shuffle(tids);
  const territories = {};
  shuffled.forEach((tid, i) => {
    territories[tid] = { id: tid, owner: players[i % players.length].id, armies: 1 };
  });
  const extraArmies = { 2:40, 3:35, 4:30, 5:25, 6:20 }[players.length] || 20;
  players.forEach(p => {
    let extra = extraArmies - Object.values(territories).filter(t => t.owner === p.id).length;
    while (extra > 0) {
      const myT = Object.values(territories).filter(t => t.owner === p.id);
      const t   = myT[Math.floor(Math.random() * myT.length)];
      t.armies++;
      extra--;
    }
  });
  const firstPlayer = players[0].id;
  return {
    phase:              'reinforce',
    currentPlayer:      firstPlayer,
    players,
    territories,
    reinforcementsLeft: calcReinforcements(Object.values(territories), firstPlayer),
    attackResult:       null,
    winner:             null,
    message:            'Coloca tus refuerzos',
    turnOrder:          players.map(p => p.id),
    turnIndex:          0,
  };
}
 
// ─── GAME LOGIC FUNCTIONS ────────────────────────────────────────────
function nextTurn(gs) {
  const alive = gs.turnOrder.filter(pid => Object.values(gs.territories).some(t => t.owner === pid));
  if (alive.length <= 1) return { ...gs, phase:'ended', winner:alive[0]||null, message:'¡Juego terminado!' };
  let nextIdx = (gs.turnIndex + 1) % gs.turnOrder.length;
  while (!alive.includes(gs.turnOrder[nextIdx])) nextIdx = (nextIdx + 1) % gs.turnOrder.length;
  const nextPid = gs.turnOrder[nextIdx];
  const reinf   = calcReinforcements(Object.values(gs.territories), nextPid);
  return {
    ...gs, phase:'reinforce', currentPlayer:nextPid, turnIndex:nextIdx,
    reinforcementsLeft:reinf, attackResult:null,
    message:`Es el turno de ${gs.players.find(p=>p.id===nextPid)?.name||'?'}. Coloca ${reinf} refuerzos.`,
  };
}
 
function applyReinforce(gs, toTerritory, armies) {
  if (!toTerritory || armies < 1) return gs;
  const actual = Math.min(armies, gs.reinforcementsLeft);
  const territories = { ...gs.territories, [toTerritory]: { ...gs.territories[toTerritory], armies: gs.territories[toTerritory].armies + actual } };
  const left = gs.reinforcementsLeft - actual;
  const ng   = { ...gs, territories, reinforcementsLeft: left };
  if (left <= 0) return { ...ng, phase:'attack', message:'Fase de Ataque — selecciona tu territorio para atacar' };
  return { ...ng, message:`${left} refuerzos restantes` };
}
 
function applyAttack(gs, fromT, toT, blitz = false) {
  const from = gs.territories[fromT];
  const to   = gs.territories[toT];
  if (!from || !to || from.armies < 2) return gs;
 
  const territories = { ...gs.territories };
  let attackResult;
 
  if (blitz) {
    let atkA = from.armies, defA = to.armies;
    let totalAtkLoss = 0, totalDefLoss = 0, rounds = 0;
    let lastAtkDice = [], lastDefDice = [], lastALoss = 0, lastDLoss = 0;
    while (atkA >= 2 && defA > 0) {
      const nd = Math.min(3, atkA - 1), dd = Math.min(2, defA);
      const ad = rollDice(nd), dd2 = rollDice(dd);
      const { aLoss, dLoss } = resolveAttack(ad, dd2);
      atkA -= aLoss; defA -= dLoss; totalAtkLoss += aLoss; totalDefLoss += dLoss;
      rounds++; lastAtkDice = ad; lastDefDice = dd2; lastALoss = aLoss; lastDLoss = dLoss;
    }
    const conquered = defA <= 0;
    const moved     = conquered ? Math.min(Math.min(3, from.armies - totalAtkLoss - 1), atkA - 1) : 0;
    territories[fromT] = { ...from, armies: atkA - moved };
    territories[toT]   = conquered ? { ...to, owner:from.owner, armies:moved } : { ...to, armies:defA };
    attackResult = {
      attackerDice:atkA>0?lastAtkDice:[], defenderDice:lastDefDice,
      attackerLosses:lastALoss, defenderLosses:lastDLoss,
      isBlitz:true, rounds, totalAttackerLosses:totalAtkLoss, totalDefenderLosses:totalDefLoss,
      territoryConquered:conquered,
    };
  } else {
    const nd = Math.min(3, from.armies - 1), dd = Math.min(2, to.armies);
    const atkDice = rollDice(nd), defDice = rollDice(dd);
    const { aLoss, dLoss } = resolveAttack(atkDice, defDice);
    const newAtk = from.armies - aLoss, newDef = to.armies - dLoss;
    const conquered = newDef <= 0;
    const moved     = conquered ? Math.min(nd, newAtk - 1) : 0;
    territories[fromT] = { ...from, armies: newAtk - moved };
    territories[toT]   = conquered ? { ...to, owner:from.owner, armies:moved } : { ...to, armies:newDef };
    attackResult = { attackerDice:atkDice, defenderDice:defDice, attackerLosses:aLoss, defenderLosses:dLoss, isBlitz:false, territoryConquered:conquered };
  }
  return { ...gs, territories, attackResult };
}
 
function applyFortify(gs, fromT, toT, armies) {
  const from = gs.territories[fromT];
  if (!from || armies < 1) return nextTurn(gs);
  const actual = Math.min(armies, from.armies - 1);
  const territories = {
    ...gs.territories,
    [fromT]: { ...from, armies: from.armies - actual },
    [toT]:   { ...gs.territories[toT], armies: gs.territories[toT].armies + actual },
  };
  return nextTurn({ ...gs, territories });
}
 
// Router de acciones para el sistema P2P
function applyAction(gs, action) {
  switch (action.type) {
    case 'reinforce':   return applyReinforce(gs, action.territory, action.armies);
    case 'attack':      return applyAttack(gs, action.from, action.to, action.blitz);
    case 'end_attack':  return { ...gs, phase:'fortify', attackResult:null, message:'Fase de Fortalecer — mueve ejércitos (opcional)' };
    case 'fortify':     return applyFortify(gs, action.from, action.to, action.armies);
    case 'skip_fortify':return nextTurn(gs);
    default:            return gs;
  }
}

// ─── ONLINE LOBBY SCREEN ──────────────────────────────────────────
function OnlineLobbyScreen({ p2p, roomCode, isHost, onBack, onGameStart }) {
  const [lobbyPlayers, setLobbyPlayers] = useState([...p2p.lobbyPlayers]);
  const [copied, setCopied]             = useState(false);
  const [disconnectMsg, setDisconnectMsg] = useState('');
 
  useEffect(() => {
    p2p.onLobbyUpdate = (players) => setLobbyPlayers([...players]);
    p2p.onGameStart   = (players, myPlayerId, initialGs) => onGameStart(players, myPlayerId, initialGs);
    p2p.onDisconnect  = (msg) => setDisconnectMsg(msg);
    return () => {
      p2p.onLobbyUpdate = null;
      // onGameStart y onDisconnect los limpia destroy()
    };
  }, [p2p, onGameStart]);
 
  const copyCode = () => {
    const fallback = () => {
      const el = document.createElement('textarea');
      el.value = roomCode;
      document.body.appendChild(el);
      el.select();
      document.execCommand('copy');
      document.body.removeChild(el);
    };
    (navigator.clipboard ? navigator.clipboard.writeText(roomCode).catch(fallback) : Promise.resolve(fallback()))
      .finally(() => { setCopied(true); setTimeout(() => setCopied(false), 2000); });
  };
 
  const handleStart = () => {
    if (lobbyPlayers.length < 2) { alert('Necesitas al menos 2 jugadores para empezar'); return; }
    const { players, myPlayerId, initialGs } = p2p.startGame();
    onGameStart(players, myPlayerId, initialGs);
  };
 
  if (disconnectMsg) return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#050d1a'}}>
      <div style={{textAlign:'center',padding:'32px'}}>
        <p style={{color:'#ff6666',fontSize:'20px',marginBottom:'16px'}}>⚠️ {disconnectMsg}</p>
        <button onClick={onBack} style={{...btn('#8B0000','#cc2200'),width:'auto',padding:'10px 24px'}}>Volver al menú</button>

    </div>
  );
 
  return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:'20px',background:'linear-gradient(135deg,#050d1a 0%,#0d2137 100%)'}}>
      <div style={{background:'rgba(0,0,0,0.85)',border:'2px solid rgba(255,215,0,0.4)',borderRadius:'16px',padding:'32px',maxWidth:'520px',width:'100%'}}>
        <button onClick={onBack} style={{background:'none',border:'none',color:'#556677',cursor:'pointer',fontSize:'13px',padding:0,marginBottom:'16px'}}>← Salir de la sala</button>
 
        <h2 style={{color:'#FFD700',fontSize:'24px',fontFamily:'Georgia,serif',textAlign:'center',marginBottom:'6px'}}>Sala de Espera</h2>
        <p style={{color:'#556677',fontSize:'12px',textAlign:'center',marginBottom:'20px'}}>
          {isHost ? '👑 Eres el host — comparte el código con tus amigos' : '⏳ Esperando que el host inicie...'}
        </p>
 
        {/* Código de sala */}
        <div style={{background:'rgba(255,215,0,0.08)',border:'2px solid rgba(255,215,0,0.35)',borderRadius:'12px',padding:'20px',marginBottom:'20px',textAlign:'center'}}>
          <p style={{color:'#aabbcc',fontSize:'11px',letterSpacing:'2px',textTransform:'uppercase',marginBottom:'10px'}}>Código de Sala</p>
          <p style={{color:'#FFD700',fontSize:'42px',fontWeight:'bold',letterSpacing:'8px',fontFamily:'monospace',lineHeight:1}}>{roomCode}</p>
          <button onClick={copyCode} style={{...btn('#223344','#334455'),marginTop:'12px',padding:'7px 20px',fontSize:'12px',width:'auto'}}>
            {copied ? '✓ ¡Copiado!' : '📋 Copiar código'}
          </button>
        </div>
 
        {/* Lista de jugadores */}
        <div style={{marginBottom:'20px'}}>
          <p style={{color:'#FFD700',fontSize:'13px',fontWeight:'bold',marginBottom:'10px'}}>Jugadores ({lobbyPlayers.length}/6):</p>
          {lobbyPlayers.map((p, i) => (
            <div key={p.peerId || i} style={{display:'flex',alignItems:'center',justifyContent:'space-between',background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.08)',borderRadius:'8px',padding:'10px 14px',marginBottom:'6px'}}>
              <div style={{display:'flex',alignItems:'center',gap:'10px'}}>
                <div style={{width:'12px',height:'12px',borderRadius:'50%',background:PLAYER_COLORS[i],boxShadow:`0 0 8px ${PLAYER_COLORS[i]}`}}/>
                <div>
                  <p style={{color:p.isHost?'#FFD700':'#eee',fontSize:'14px',fontWeight:p.isHost?'bold':'normal'}}>{p.name}</p>
                  <p style={{color:'#445566',fontSize:'11px'}}>{p.isHost?'👑 Host':'Jugador'} · {COLOR_NAMES[PLAYER_COLORS[i]]}</p>
                </div>
              </div>
              {isHost && !p.isHost && (
                <button onClick={()=>p2p.kickPlayer(p.peerId)}
                  style={{...btn('#8B0000','#cc2200'),width:'auto',padding:'4px 10px',fontSize:'11px'}}>
                  Expulsar
                </button>
              )}
            </div>
          ))}
          {lobbyPlayers.length < 6 && (
            <p style={{color:'#334455',fontSize:'11px',textAlign:'center',marginTop:'8px'}}>
              Esperando más jugadores… (máx. 6)
            </p>
          )}
        </div>
 
        {isHost ? (
          <button onClick={handleStart} style={btn('#226600','#33aa00')}>
            ▶️ Iniciar Juego ({lobbyPlayers.length} jugadores)
          </button>
        ) : (
          <div style={{background:'rgba(26,92,158,0.15)',border:'1px solid rgba(26,92,158,0.3)',borderRadius:'8px',padding:'14px',textAlign:'center'}}>
            <p style={{color:'#88aacc',fontSize:'13px'}}>⏳ Esperando que el host inicie el juego…</p>
          </div>
        )}
      </div>
    </div>
  );
}
 
// ─── SETUP SCREEN (local) ────────────────────────────────────────
function SetupScreen({ onStart, onBack }) {
  const [players, setPlayers] = useState([
    {name:'Jugador 1',color:PLAYER_COLORS[0]},
    {name:'Jugador 2',color:PLAYER_COLORS[1]},
  ]);
  const [err, setErr] = useState('');
 
  const addPlayer    = () => { if (players.length >= 6) return; setPlayers(p=>[...p,{name:`Jugador ${p.length+1}`,color:PLAYER_COLORS[p.length]}]); };
  const removePlayer = i  => { if (players.length <= 2) return; setPlayers(p=>p.filter((_,j)=>j!==i)); };
  const updateName   = (i,v)=> setPlayers(p=>p.map((pl,j)=>j===i?{...pl,name:v}:pl));
 
  const start = () => {
    for (const p of players) { if (!p.name.trim()) { setErr('Todos los jugadores necesitan nombre'); return; } }
    setErr('');
    onStart(players.map((p,i)=>({id:'p'+i,name:p.name.trim(),color:p.color})));
  };
 
  return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:'20px',background:'linear-gradient(135deg,#050d1a 0%,#0d2137 100%)'}}>
      <div style={{background:'rgba(0,0,0,0.85)',border:'2px solid rgba(255,215,0,0.4)',borderRadius:'16px',padding:'32px',maxWidth:'480px',width:'100%'}}>
        <button onClick={onBack} style={{background:'none',border:'none',color:'#556677',cursor:'pointer',fontSize:'13px',padding:0,marginBottom:'16px'}}>← Volver</button>
        <h2 style={{color:'#FFD700',fontSize:'26px',fontFamily:'Georgia,serif',textAlign:'center',marginBottom:'24px'}}>Configurar Partida</h2>
        <p style={{color:'#aabbcc',fontSize:'12px',marginBottom:'14px'}}>Jugadores ({players.length}/6)</p>
        {players.map((p,i)=>(
          <div key={i} style={{display:'flex',gap:'8px',alignItems:'center',marginBottom:'8px'}}>
            <div style={{width:'18px',height:'18px',borderRadius:'50%',background:p.color,flexShrink:0,boxShadow:`0 0 6px ${p.color}`}}/>
            <input value={p.name} onChange={e=>updateName(i,e.target.value)} maxLength={20}
              style={{...inp,flex:1,padding:'7px 10px',fontSize:'14px'}}/>
            {players.length>2&&<button onClick={()=>removePlayer(i)} style={{...smBtn,width:'28px',height:'28px',background:'rgba(180,0,0,0.3)',border:'1px solid #cc2200'}}>✕</button>}
          </div>
        ))}
        {players.length<6&&<button onClick={addPlayer} style={{...btn('#223344','#334455'),marginBottom:'16px',fontSize:'13px',padding:'8px'}}>+ Agregar Jugador</button>}
        {err&&<p style={{color:'#ff6666',textAlign:'center',fontSize:'13px',marginBottom:'10px'}}>{err}</p>}
        <button onClick={start} style={btn('#8B0000','#cc2200')}>⚔️ Iniciar Juego</button>
      </div>
    </div>
  );
}
 
// ─── GAME SCREEN ─────────────────────────────────────────────────────
function GameScreen({ initialPlayers, initialGameState, onBack, isOnline = false, p2p = null, myPlayerId = null }) {
  const [gs, setGs]               = useState(() => initialGameState || initGame(initialPlayers));
  const [selectedFrom, setFrom]   = useState(null);
  const [selectedTo, setTo]       = useState(null);
  const [reinforceAmt, setReinAmt]= useState(1);
  const [fortifyAmt, setFortAmt]  = useState(1);
  const [showBanner, setShowBanner]= useState(true);
  const [discMsg, setDiscMsg]     = useState('');
 
  const currentPlayer = gs.players.find(p => p.id === gs.currentPlayer);
  const isMyTurn      = !isOnline || gs.currentPlayer === myPlayerId;
  const myPlayer      = isOnline ? gs.players.find(p => p.id === myPlayerId) : null;
 
  // ── P2P callbacks ─────────────────────────────────────────────────
  useEffect(() => {
    if (!isOnline || !p2p) return;
 
    // Cliente: recibe el nuevo estado del juego desde el host
    p2p.onGameStateUpdate = (newGs) => {
      setGs(newGs);
      setFrom(null);
      setTo(null);
    };
 
    // Host: recibe acciones de los clientes, las valida y aplica
    if (p2p.isHost) {
      p2p.onGameAction = (action, senderPeerId) => {
        setGs(prevGs => {
          // Validar que sea el turno del jugador que envía
          const sender = prevGs.players.find(pl => pl.peerId === senderPeerId);
          if (!sender || prevGs.currentPlayer !== sender.id) return prevGs;
          const newGs = applyAction(prevGs, action);
          p2p.broadcastGameState(newGs);
          return newGs;
        });
      };
    }
 
    p2p.onDisconnect = (msg) => setDiscMsg(msg);
 
    return () => {
      if (p2p) { p2p.onGameStateUpdate = null; p2p.onGameAction = null; p2p.onDisconnect = null; }
    };
  }, [isOnline, p2p]);
 
  // ── Turn banner ───────────────────────────────────────────────────
  useEffect(() => {
    setShowBanner(true);
    const t = setTimeout(() => setShowBanner(false), 2500);
    return () => clearTimeout(t);
  }, [gs.currentPlayer]);
 
  // ── Dispatch de acciones (local o P2P) ───────────────────────────
  const dispatch = useCallback((action) => {
    if (!isOnline || !p2p) {
      setGs(prev => applyAction(prev, action));
      return;
    }
    if (p2p.isHost) {
      setGs(prev => {
        const newGs = applyAction(prev, action);
        p2p.broadcastGameState(newGs);
        return newGs;
      });
    } else {
      p2p.sendAction(action);
    }
  }, [isOnline, p2p]);
 
  // ── Click en territorio ───────────────────────────────────────────
  const onTerritoryClick = (clicked) => {
    if (!isMyTurn || gs.phase === 'ended') return;
    const clickedT = gs.territories[clicked];
    if (!clickedT) return;
 
    if (gs.phase === 'reinforce') {
      if (clickedT.owner === gs.currentPlayer) { setTo(clicked); setFrom(null); }
    } else if (gs.phase === 'attack') {
      if (!selectedFrom) {
        if (clickedT.owner === gs.currentPlayer && clickedT.armies >= 2) { setFrom(clicked); setTo(null); }
      } else {
        if (clicked === selectedFrom) { setFrom(null); return; }
        if (clickedT.owner !== gs.currentPlayer && (NEIGHBORS[selectedFrom]||[]).includes(clicked)) { setTo(clicked); }
        else if (clickedT.owner === gs.currentPlayer && clickedT.armies >= 2) { setFrom(clicked); setTo(null); }
      }
    } else if (gs.phase === 'fortify') {
      if (!selectedFrom) {
        if (clickedT.owner === gs.currentPlayer && clickedT.armies >= 2) { setFrom(clicked); setTo(null); }
      } else {
        if (clicked === selectedFrom) { setFrom(null); return; }
        if (clickedT.owner === gs.currentPlayer && (NEIGHBORS[selectedFrom]||[]).includes(clicked)) { setTo(clicked); }
        else if (clickedT.owner === gs.currentPlayer && clickedT.armies >= 2) { setFrom(clicked); setTo(null); }
      }
    }
  };
 
  // ── Acciones ──────────────────────────────────────────────────────
  const doReinforce = (armies) => {
    if (!selectedTo) return;
    dispatch({ type:'reinforce', territory:selectedTo, armies });
    setTo(null); setReinAmt(1);
  };
 
  const doAttack = (blitz) => {
    if (!selectedFrom || !selectedTo) return;
    dispatch({ type:'attack', from:selectedFrom, to:selectedTo, blitz });
    setFrom(null); setTo(null);
  };
 
  const doEndAttack  = () => { dispatch({ type:'end_attack' });  setFrom(null); setTo(null); };
  const doSkipFortify= () => { dispatch({ type:'skip_fortify'}); setFrom(null); setTo(null); };
 
  const doFortify = () => {
    if (!selectedFrom || !selectedTo) { doSkipFortify(); return; }
    const max = (gs.territories[selectedFrom]?.armies||1) - 1;
    dispatch({ type:'fortify', from:selectedFrom, to:selectedTo, armies:Math.min(fortifyAmt,max) });
    setFrom(null); setTo(null); setFortAmt(1);
  };
 
  const fromT = selectedFrom ? gs.territories[selectedFrom] : null;
 
  // ── Desconexión ───────────────────────────────────────────────────
  if (discMsg) return (
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#050d1a'}}>
      <div style={{textAlign:'center',padding:'32px'}}>
        <p style={{color:'#ff6666',fontSize:'20px',marginBottom:'8px'}}>⚠️ Desconexión</p>
        <p style={{color:'#aabbcc',fontSize:'14px',marginBottom:'20px'}}>{discMsg}</p>
        <button onClick={onBack} style={{...btn('#8B0000','#cc2200'),width:'auto',padding:'10px 24px'}}>Volver al menú</button>
      </div>
    </div>
  );
 
  return (
    <div style={{background:'#050d1a',minHeight:'100vh',display:'flex',flexDirection:'column',fontFamily:'Arial,sans-serif',position:'relative'}}>
 
      {/* Turn banner */}
      {showBanner && gs.phase !== 'ended' && (
        <div style={{position:'fixed',inset:0,display:'flex',alignItems:'center',justifyContent:'center',zIndex:100,background:'rgba(0,0,0,0.78)',pointerEvents:'none'}}>
          <div style={{background:`linear-gradient(135deg,${currentPlayer?.color||'#FFD700'}22,rgba(0,0,0,0.92))`,border:`2px solid ${currentPlayer?.color||'#FFD700'}`,borderRadius:'20px',padding:'32px 48px',textAlign:'center'}}>
            <p style={{color:'#aabbcc',fontSize:'13px',letterSpacing:'2px',marginBottom:'8px'}}>TURNO DE</p>
            <p style={{color:currentPlayer?.color||'#FFD700',fontSize:'32px',fontWeight:'bold',fontFamily:'Georgia,serif'}}>{currentPlayer?.name||'?'}</p>
            <p style={{color:'#556677',fontSize:'12px',marginTop:'8px'}}>Fase: {phaseLabel(gs.phase)}</p>
            {isOnline && (
              <p style={{color:isMyTurn?'#2ecc71':'#e74c3c',fontSize:'13px',fontWeight:'bold',marginTop:'6px'}}>
                {isMyTurn ? '⚔️ ¡Es tu turno!' : `⏳ Turno de ${currentPlayer?.name}`}
              </p>
            )}
          </div>
        </div>
      )}
 
      {/* Top bar */}
      <div style={{background:'rgba(0,0,0,0.92)',borderBottom:'2px solid #FFD70055',padding:'7px 14px',display:'flex',alignItems:'center',gap:'12px',flexWrap:'wrap',flexShrink:0}}>
        <span style={{color:'#FFD700',fontFamily:'Georgia,serif',fontSize:'20px',fontWeight:'bold'}}>RISK</span>
        {isOnline && (
          <span style={{background:'rgba(26,124,204,0.2)',border:'1px solid #1a7ccc55',borderRadius:'10px',padding:'2px 8px',color:'#88aaff',fontSize:'11px'}}>
            🌐 {p2p.roomCode} · {myPlayer?.name}
            {p2p.isHost && <span style={{color:'#FFD700'}}> 👑</span>}
          </span>
        )}
        <div style={{display:'flex',gap:'5px',alignItems:'center',flexWrap:'wrap',flex:1}}>
          {gs.players.map(p=>{
            const tCount = Object.values(gs.territories).filter(t=>t.owner===p.id).length;
            const isCur  = gs.currentPlayer === p.id;
            const isMe   = isOnline && p.id === myPlayerId;
            if (tCount === 0) return null;
            return (
              <div key={p.id} style={{display:'flex',alignItems:'center',gap:'4px',padding:'2px 7px',borderRadius:'12px',border:`2px solid ${isCur?p.color:isMe?p.color+'55':'transparent'}`,background:isCur?`${p.color}22`:isMe?`${p.color}11`:'transparent'}}>
                <div style={{width:'9px',height:'9px',borderRadius:'50%',background:p.color}}/>
                <span style={{color:p.color,fontSize:'11px',fontWeight:'bold'}}>{p.name}{isMe?'(tú)':''} ({tCount}){isCur?' ▶':''}</span>
              </div>
            );
          })}
        </div>
        <button onClick={onBack} style={{background:'none',border:'1px solid #334455',borderRadius:'6px',color:'#556677',cursor:'pointer',fontSize:'11px',padding:'4px 8px'}}>✕ Salir</button>
      </div>
 
      {/* Map + Sidebar */}
      <div style={{display:'flex',flex:1,overflow:'hidden',minHeight:0}}>
 
        {/* Map */}
        <div style={{flex:1,overflow:'hidden',background:'#050d1a',transition:'opacity .2s',opacity:(!isOnline||isMyTurn||gs.phase==='ended')?1:0.80}}>
          <WorldMapSvg gameState={gs} selectedFrom={selectedFrom} selectedTo={selectedTo} onTerritoryClick={onTerritoryClick}/>
        </div>
 
        {/* Sidebar */}
        <div style={{width:'270px',minWidth:'270px',background:'rgba(2,8,18,0.97)',borderLeft:'1px solid #FFD70033',display:'flex',flexDirection:'column',padding:'12px',gap:'9px',overflowY:'auto',maxHeight:'100%'}}>
 
          {/* Phase header */}
          <div style={{background:`${currentPlayer?.color||'#FFD700'}18`,border:`1px solid ${currentPlayer?.color||'#FFD700'}44`,borderRadius:'8px',padding:'9px'}}>
            <p style={{color:'#FFD700',fontSize:'10px',fontWeight:'bold',marginBottom:'2px',textTransform:'uppercase',letterSpacing:'1px'}}>Fase: {phaseLabel(gs.phase)}</p>
            <p style={{color:currentPlayer?.color||'#fff',fontSize:'13px',fontWeight:'bold'}}>{currentPlayer?.name||'?'}</p>
            <p style={{color:'#88aacc',fontSize:'10px',marginTop:'3px'}}>{gs.message}</p>
          </div>
 
          {/* Online: not my turn */}
          {isOnline && !isMyTurn && gs.phase !== 'ended' && (
            <div style={{background:'rgba(20,40,70,0.6)',border:'1px solid rgba(100,140,200,0.25)',borderRadius:'8px',padding:'14px',textAlign:'center'}}>
              <p style={{color:'#6688aa',fontSize:'11px',marginBottom:'6px',textTransform:'uppercase',letterSpacing:'1px'}}>Esperando</p>
              <p style={{color:currentPlayer?.color,fontSize:'15px',fontWeight:'bold'}}>{currentPlayer?.name}</p>
              <p style={{color:'#445566',fontSize:'11px',marginTop:'4px'}}>Fase: {phaseLabel(gs.phase)}</p>
            </div>
          )}
 
          {/* Winner */}
          {gs.winner && (
            <div style={{background:'rgba(255,215,0,0.12)',border:'2px solid #FFD700',borderRadius:'10px',padding:'14px',textAlign:'center'}}>
              <p style={{color:'#FFD700',fontSize:'20px',fontWeight:'bold',fontFamily:'Georgia,serif'}}>🏆 VICTORIA!</p>
              <p style={{color:'#fff',fontSize:'14px',marginTop:'4px'}}>{gs.players.find(p=>p.id===gs.winner)?.name}</p>
              {isOnline && gs.winner===myPlayerId && <p style={{color:'#2ecc71',fontSize:'12px',marginTop:'4px'}}>¡Ganaste! 🎉</p>}
              <button onClick={onBack} style={{...btn('#8B0000','#cc2200'),marginTop:'10px',padding:'8px 16px',fontSize:'13px'}}>Volver</button>
            </div>
          )}
 
          {/* Action controls (only when it's my turn) */}
          {!gs.winner && isMyTurn && (
            <div style={{display:'flex',flexDirection:'column',gap:'7px'}}>
 
              {/* REINFORCE */}
              {gs.phase==='reinforce' && <>
                <p style={{color:'#aabbcc',fontSize:'12px'}}>Refuerzos: <strong style={{color:'#FFD700',fontSize:'14px'}}>{gs.reinforcementsLeft}</strong></p>
                {selectedTo ? (
                  <>
                    <p style={{color:'#ccc',fontSize:'11px'}}>Territorio: <strong style={{color:'#FFD700'}}>{TERRITORY_POSITIONS[selectedTo]?.label}</strong></p>
                    <div style={{display:'flex',alignItems:'center',gap:'6px'}}>
                      <button onClick={()=>setReinAmt(m=>Math.max(1,m-1))} style={smBtn}>−</button>
                      <span style={{color:'#FFD700',fontWeight:'bold',minWidth:'26px',textAlign:'center'}}>{Math.min(reinforceAmt,gs.reinforcementsLeft)}</span>
                      <button onClick={()=>setReinAmt(m=>Math.min(gs.reinforcementsLeft,m+1))} style={smBtn}>+</button>
                      <button onClick={()=>doReinforce(Math.min(reinforceAmt,gs.reinforcementsLeft))} style={{...btn('#226600','#33aa00'),padding:'3px 10px',fontSize:'11px',flex:1}}>Reforzar</button>
                    </div>
                    <button onClick={()=>doReinforce(gs.reinforcementsLeft)} style={{...btn('#554400','#886600'),fontSize:'11px'}}>Colocar todos ({gs.reinforcementsLeft})</button>
                  </>
                ) : (
                  <p style={{color:'#556677',fontSize:'11px'}}>Haz clic en uno de tus territorios para reforzar</p>
                )}
              </>}
 
              {/* ATTACK */}
              {gs.phase==='attack' && <>
                {!selectedFrom && <p style={{color:'#556677',fontSize:'11px'}}>Clic en un territorio tuyo (2+ ejércitos) para atacar</p>}
                {selectedFrom && !selectedTo && <p style={{color:'#aabbcc',fontSize:'11px'}}>Desde: <strong style={{color:'#FFD700'}}>{TERRITORY_POSITIONS[selectedFrom]?.label}</strong></p>}
                {selectedFrom && selectedTo && <>
                  <p style={{color:'#ccc',fontSize:'11px'}}>
                    <strong style={{color:'#FFD700'}}>{TERRITORY_POSITIONS[selectedFrom]?.label}</strong>
                    <span style={{color:'#666'}}> vs </span>
                    <strong style={{color:'#ff4444'}}>{TERRITORY_POSITIONS[selectedTo]?.label}</strong>
                  </p>
                  <div style={{display:'flex',flexDirection:'column',gap:'5px'}}>
                    <button onClick={()=>doAttack(false)} style={btn('#8B0000','#cc2200')}>⚔️ ATACAR (1 ronda)</button>
                    <button onClick={()=>doAttack(true)} style={{...btn('#6B0000','#ff3300'),boxShadow:'0 4px 15px #ff330055'}}>💥 BLITZ — ATACAR TODO</button>
                  </div>
                </>}
                <button onClick={doEndAttack} style={{...btn('#443300','#665500'),fontSize:'11px'}}>Terminar ataques →</button>
              </>}
 
              {/* FORTIFY */}
              {gs.phase==='fortify' && <>
                {!selectedFrom && <p style={{color:'#556677',fontSize:'11px'}}>Opcional: mueve ejércitos entre territorios adyacentes</p>}
                {selectedFrom && !selectedTo && <p style={{color:'#aabbcc',fontSize:'11px'}}>Desde: <strong style={{color:'#FFD700'}}>{TERRITORY_POSITIONS[selectedFrom]?.label}</strong></p>}
                {selectedFrom && selectedTo && (()=>{
                  const max = (fromT?.armies||1) - 1;
                  return <>
                    <p style={{color:'#ccc',fontSize:'11px'}}>
                      <strong style={{color:'#FFD700'}}>{TERRITORY_POSITIONS[selectedFrom]?.label}</strong>
                      <span style={{color:'#666'}}> → </span>
                      <strong style={{color:'#2ecc71'}}>{TERRITORY_POSITIONS[selectedTo]?.label}</strong>
                    </p>
                    <div style={{display:'flex',alignItems:'center',gap:'6px'}}>
                      <button onClick={()=>setFortAmt(m=>Math.max(1,m-1))} style={smBtn}>−</button>
                      <span style={{color:'#FFD700',fontWeight:'bold',minWidth:'26px',textAlign:'center'}}>{Math.min(fortifyAmt,max)}</span>
                      <button onClick={()=>setFortAmt(m=>Math.min(max,m+1))} style={smBtn}>+</button>
                    </div>
                    <button onClick={doFortify} style={btn('#226600','#33aa00')}>Fortalecer</button>
                  </>;
                })()}
                <button onClick={doSkipFortify} style={btn('#003366','#1a5c9e')}>Terminar turno →</button>
              </>}
            </div>
          )}
 
          {/* Attack result */}
          {gs.attackResult && <AttackResultPanel result={gs.attackResult}/>}
 
          {/* Scoreboard */}
          <div style={{marginTop:'auto',borderTop:'1px solid #112233',paddingTop:'9px'}}>
            <p style={{color:'#334455',fontSize:'9px',marginBottom:'5px',textTransform:'uppercase',letterSpacing:'1px'}}>Territorios / Ejércitos</p>
            {gs.players.map(p => {
              const tCount = Object.values(gs.territories).filter(t=>t.owner===p.id).length;
              const aCount = Object.values(gs.territories).filter(t=>t.owner===p.id).reduce((s,t)=>s+t.armies,0);
              const elim   = tCount === 0;
              const isMe   = isOnline && p.id === myPlayerId;
              return (
                <div key={p.id} style={{display:'flex',alignItems:'center',gap:'5px',marginBottom:'3px',opacity:elim?0.35:1}}>
                  <div style={{width:'7px',height:'7px',borderRadius:'50%',background:p.color,flexShrink:0}}/>
                  <span style={{color:p.id===gs.currentPlayer?p.color:'#778899',fontSize:'10px',flex:1}}>
                    {p.name}{isMe?' (tú)':''}{elim?' ✝':''}
                  </span>
                  <span style={{color:'#445566',fontSize:'9px'}}>{tCount}t/{aCount}a</span>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}
 
// ─── APP ROOT ────────────────────────────────────────────────────────
function App() {
  const [screen, setScreen]               = useState('home');
  const [players, setPlayers]             = useState(null);
  const [onlineGameState, setOnlineGs]    = useState(null);
  const [myPlayerId, setMyPlayerId]       = useState(null);
  const [p2pInfo, setP2pInfo]             = useState(null); // { roomCode, isHost }
  const p2pRef = useRef(null);
 
  const handleP2PReady = (p2p, roomCode, isHost) => {
    p2pRef.current = p2p;
    setP2pInfo({ roomCode, isHost });
    setScreen('online-lobby');
  };
 
  const handleGameStart = (gamePlayers, myPid, initialGs) => {
    setPlayers(gamePlayers);
    setMyPlayerId(myPid);
    setOnlineGs(initialGs);
    setScreen('online-game');
  };
 
  const leaveOnline = () => {
    if (p2pRef.current) { p2pRef.current.destroy(); p2pRef.current = null; }
    setP2pInfo(null); setPlayers(null); setMyPlayerId(null); setOnlineGs(null);
    setScreen('home');
  };
 
  const leaveLobby = () => {
    if (p2pRef.current) { p2pRef.current.destroy(); p2pRef.current = null; }
    setP2pInfo(null);
    setScreen('online-home');
  };
 
  if (screen === 'home')
    return <HomeScreen onStart={()=>setScreen('setup')} onOnline={()=>setScreen('online-home')}/>;
 
  if (screen === 'online-home')
    return <OnlineHomeScreen onBack={()=>setScreen('home')} onP2PReady={handleP2PReady}/>;
 
  if (screen === 'online-lobby' && p2pRef.current && p2pInfo)
    return <OnlineLobbyScreen
      p2p={p2pRef.current} roomCode={p2pInfo.roomCode} isHost={p2pInfo.isHost}
      onBack={leaveLobby} onGameStart={handleGameStart}/>;
 
  if (screen === 'setup')
    return <SetupScreen onStart={ps=>{setPlayers(ps);setScreen('game');}} onBack={()=>setScreen('home')}/>;
 
  if (screen === 'game' && players)
    return <GameScreen initialPlayers={players} onBack={()=>{setPlayers(null);setScreen('home');}}/>;
 
  if (screen === 'online-game' && players && onlineGameState)
    return <GameScreen
      initialPlayers={players} initialGameState={onlineGameState}
      onBack={leaveOnline} isOnline={true} p2p={p2pRef.current} myPlayerId={myPlayerId}/>;
 
  return null;
}
 
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
